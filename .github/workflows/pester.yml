name: pester

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pester:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container:
          - ghcr.io/peppekerstens/pwsh-pester-ubuntu:24.04
          - ghcr.io/peppekerstens/pwsh-pester-debian:12
          - ghcr.io/peppekerstens/pwsh-pester-fedora:40
          - ghcr.io/peppekerstens/pwsh-pester-opensuse:tumbleweed
          - ghcr.io/peppekerstens/pwsh-pester-arch:latest
    container:
      image: ${{ matrix.container }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build (Release)
        run: dotnet build src/ScheduledTasks.Linux.Native/ScheduledTasks.Linux.Native.csproj --configuration Release

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/ScheduledTasks.Linux.Native.Tests/ScheduledTasks.Linux.Native.Tests.ps1'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config
